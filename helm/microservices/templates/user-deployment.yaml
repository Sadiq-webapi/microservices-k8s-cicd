apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service  # <--- Make sure this does NOT have :latest
  namespace: microservices
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
      - name: user-service
        image: user-service:latest  # <--- This is where :latest belongs
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3001
        envFrom:
        - configMapRef:
            name: app-config